<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fard Vault - Your Passwords</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-gradient-start: #0b0b0b;
      --bg-gradient-end: #121212;
      --text-primary: #e0e0e0;
      --text-secondary: #c2f0c2;
      --container-bg: rgba(20, 20, 20, 0.95);
      --accent-green: #39ff14;
      --accent-dark: #14532d;
      --input-bg: #111;
      --input-border: #333;
      --card-bg: #1a1a1a;
      --hover-bg: #222;
      --danger-red: #ff4444;
    }
    
    [data-theme="light"] {
      --bg-gradient-start: #F9FAFB;
      --bg-gradient-end: #F9FAFB;
      --text-primary: #111827;
      --text-secondary: #FCD34D;
      --container-bg: #FFFFFF;
      --accent-green: #14532D;
      --accent-dark: #0F4037;
      --input-bg: #FFFFFF;
      --input-border: #D1D5DB;
      --card-bg: #F9FAFB;
      --hover-bg: #F3F4F6;
      --danger-red: #DC2626;
    }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .vault-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
    }
    
    .sidebar {
      background: var(--container-bg);
      padding: 20px;
      border-right: 2px solid var(--input-border);
      overflow-y: auto;
    }
    
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }
    
    .logo { font-size: 1.5em; font-weight: bold; }
    
    .theme-toggle {
      background: transparent;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      transition: transform 0.3s;
    }
    
    .theme-toggle:hover { transform: scale(1.2); }
    
    .category-list {
      list-style: none;
    }
    
    .category-item {
      padding: 12px;
      margin-bottom: 8px;
      background: var(--card-bg);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .category-item:hover { background: var(--hover-bg); transform: translateX(3px); }
    .category-item.active { background: var(--accent-green); color: #000; font-weight: bold; }
    
    .main-content {
      padding: 20px;
      overflow-y: auto;
    }
    
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .search-box {
      flex: 1;
      min-width: 300px;
      padding: 12px;
      background: var(--input-bg);
      border: 2px solid var(--input-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
    }
    
    .search-box:focus { outline: none; border-color: var(--accent-green); }
    
    .top-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-green));
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: inherit;
    }
    
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(57, 255, 20, 0.3); }
    .btn-danger { background: var(--danger-red); }
    .btn-secondary { background: #555; }
    
    .entries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .entry-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid var(--input-border);
      transition: all 0.3s;
    }
    
    .entry-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(57, 255, 20, 0.2);
      border-color: var(--accent-green);
    }
    
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }
    
    .entry-title {
      font-size: 1.2em;
      font-weight: bold;
      color: var(--accent-green);
    }
    
    .entry-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.2em;
      cursor: pointer;
      transition: all 0.2s;
      padding: 5px;
    }
    
    .icon-btn:hover { transform: scale(1.2); }
    
    .entry-field {
      margin-bottom: 10px;
      padding: 8px;
      background: var(--input-bg);
      border-radius: 6px;
      font-size: 0.9em;
    }
    
    .entry-field label {
      display: block;
      color: var(--text-secondary);
      font-size: 0.8em;
      margin-bottom: 4px;
    }
    
    .password-field {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .password-value {
      flex: 1;
      font-family: monospace;
    }
    
    .password-hidden { filter: blur(5px); user-select: none; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: var(--container-bg);
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-title { font-size: 1.5em; color: var(--accent-green); }
    
    .close-btn {
      background: transparent;
      border: none;
      font-size: 2em;
      cursor: pointer;
      color: var(--text-primary);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 2px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
    }
    
    .form-group textarea { resize: vertical; min-height: 100px; }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent-green);
    }
    
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      background: var(--accent-green);
      color: #000;
      border-radius: 8px;
      font-weight: bold;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .notification.error { background: var(--danger-red); color: white; }
    .notification.success { background: var(--accent-green); color: #000; }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state-icon { font-size: 4em; margin-bottom: 20px; }
    
    .loading { 
      text-align: center; 
      padding: 40px; 
    }
    
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    
    .skeleton-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid var(--input-border);
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }
    
    .skeleton-line {
      height: 20px;
      background: linear-gradient(90deg, var(--input-border) 25%, var(--hover-bg) 50%, var(--input-border) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .entry-card {
      animation: fadeInUp 0.4s ease-out;
    }
    
    @keyframes successPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .success-animation {
      animation: successPulse 0.3s ease-in-out;
    }
    
    .vault-footer {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--input-border);
      font-size: 0.85em;
      color: var(--text-secondary);
      background: var(--container-bg);
    }
    
    .vault-footer a {
      color: var(--accent-green);
      text-decoration: none;
      font-weight: bold;
    }
    
    .vault-footer a:hover {
      text-decoration: underline;
    }
    
    @media (max-width: 768px) {
      .vault-container { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 2px solid var(--input-border); }
      .entries-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="vault-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">🔐 Fard Vault</div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
      
      <ul class="category-list" id="categoryList">
        <li class="category-item active" data-category="all">
          <span>📁</span> All Passwords
        </li>
        <li class="category-item" data-category="social">
          <span>🌐</span> Social Media
        </li>
        <li class="category-item" data-category="banking">

        </li>
        <li class="category-item" data-category="email">
          <span>📧</span> Email
        </li>
        <li class="category-item" data-category="work">
          <span>💼</span> Work
        </li>
        <li class="category-item" data-category="gaming">
          <span>🎮</span> Gaming
        </li>
        <li class="category-item" data-category="shopping">
          <span>🛒</span> Shopping
        </li>
        <li class="category-item" data-category="other">
          <span>📦</span> Other
        </li>
      </ul>
      
      <div style="margin-top: 30px;">
        <button class="btn" onclick="openAddModal()" style="width: 100%;">➕ New Password</button>
        <button class="btn" onclick="showHealthDashboard()" style="width: 100%; margin-top: 10px; background: #17a2b8;">🏥 Health Check</button>
        <button class="btn btn-secondary" onclick="lockVault()" style="width: 100%; margin-top: 10px;">🔒 Lock Vault</button>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="top-bar">
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search passwords..."/>
        <div class="top-actions">
          <button class="btn" onclick="exportVault()">📤 Export</button>
          <button class="btn" onclick="importVault()">📥 Import</button>

      <div id="entriesContainer" class="loading">
        <div class="skeleton-grid">
          <div class="skeleton-card">

            <div class="skeleton-line medium"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
          </div>
        </div>
      </div>
      
      <footer class="vault-footer">
        A <a href="https://github.com/mehedyk" target="_blank" rel="noopener noreferrer">mehedyk</a> product. 
        Works with <a href="https://pw-generator-fard.netlify.app" target="_blank" rel="noopener noreferrer">Fard Password Generator</a>. 
        All rights reserved. &copy; <span id="vaultYear"></span>.
      </footer>
    </main>
  </div>
  
  <!-- Add/Edit Modal -->
  <div class="modal" id="entryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Password</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="entryForm" onsubmit="saveEntry(event)">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="entryTitle" required placeholder="e.g., Gmail, Facebook"/>
        </div>
        <div class="form-group">
          <label>Username / Email</label>
          <input type="text" id="entryUsername" placeholder="user@example.com"/>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="entryPassword" required/>
        </div>
        <div class="form-group">
          <label>Website URL</label>
          <input type="url" id="entryUrl" placeholder="https://example.com"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="entryCategory">
            <option value="social">🌐 Social Media</option>
            <option value="banking">💳 Banking</option>
            <option value="email">📧 Email</option>
            <option value="work">💼 Work</option>
            <option value="gaming">🎮 Gaming</option>
            <option value="shopping">🛒 Shopping</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="entryNotes" placeholder="Additional information..."></textarea>
        </div>
        <button type="submit" class="btn" style="width: 100%;">💾 Save</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
  
  <script type="module">
    // Configuration
    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL || '';
    const SUPABASE_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY || '';
    
    // Debug: Log if env vars are missing
    if (!SUPABASE_URL || !SUPABASE_KEY) {
      console.error('❌ Environment variables not set!');
      console.error('VITE_SUPABASE_URL:', SUPABASE_URL || 'MISSING');
      console.error('VITE_SUPABASE_ANON_KEY:', SUPABASE_KEY ? 'Set ✅' : 'MISSING');
      alert('Configuration error: Environment variables not set. Check Vercel settings.');
    }
    
    // Initialize Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Global state
    let currentUser = null;
    let encryptionKey = null;
    let allEntries = [];
    let currentCategory = 'all';
    let editingEntryId = null;
    
    // Crypto utilities
    async function deriveKey(password, salt) {
      const result = await argon2.hash({
        pass: password,
        salt: salt,
        time: 4,
        mem: 65536,
        hashLen: 32,
        parallelism: 4,
        type: argon2.ArgonType.Argon2id
      });
      return result.hash;
    }
    
    async function encryptData(data, key) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encodedData = new TextEncoder().encode(JSON.stringify(data));
      const cryptoKey = await crypto.subtle.importKey(
        'raw', key, {name: 'AES-GCM'}, false, ['encrypt']
      );
      const encrypted = await crypto.subtle.encrypt(
        {name: 'AES-GCM', iv}, cryptoKey, encodedData
      );
      return {
        encrypted: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
        iv: btoa(String.fromCharCode(...iv))
      };
    }
    
    async function decryptData(encryptedData, iv, key) {
      const cryptoKey = await crypto.subtle.importKey(
        'raw', key, {name: 'AES-GCM'}, false, ['decrypt']
      );
      const encryptedBytes = Uint8Array.from(atob(encryptedData), c => c.charCodeAt(0));
      const ivBytes = Uint8Array.from(atob(iv), c => c.charCodeAt(0));
      const decrypted = await crypto.subtle.decrypt(
        {name: 'AES-GCM', iv: ivBytes}, cryptoKey, encryptedBytes
      );
      return JSON.parse(new TextDecoder().decode(decrypted));
    }
    
    // Initialize vault
    async function initVault() {
      const {data: {user}} = await supabase.auth.getUser();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }
      currentUser = user;
      
      const masterPassword = sessionStorage.getItem('master_password');
      if (!masterPassword) {
        window.location.href = '/login.html';
        return;
      }
      
      const {data: keyData} = await supabase.from('user_keys').select('salt').eq('user_id', user.id).single();
      if (!keyData) {
        showNotification('Error loading vault', 'error');
        return;
      }
      
      const salt = Uint8Array.from(atob(keyData.salt), c => c.charCodeAt(0));
      encryptionKey = await deriveKey(masterPassword, salt);
      
      await loadEntries();
    }
    
    async function loadEntries() {
      const {data, error} = await supabase.from('vault_entries').select('*').eq('user_id', currentUser.id);
      if (error) {
        showNotification('Error loading entries', 'error');
        return;
      }
      
      allEntries = [];
      for (const entry of data) {
        try {
          const decrypted = await decryptData(entry.encrypted_data, entry.iv, encryptionKey);
          allEntries.push({
            id: entry.id,
            category: entry.category,
            favorite: entry.favorite,
            created_at: entry.created_at,
            ...decrypted
          });
        } catch (e) {
          console.error('Failed to decrypt entry:', e);
        }
      }
      
      renderEntries();
    }
    
    function renderEntries() {
      const container = document.getElementById('entriesContainer');
      let filtered = currentCategory === 'all' ? allEntries : allEntries.filter(e => e.category === currentCategory);
      
      const searchTerm = document.getElementById('searchBox').value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(e => 
          e.title?.toLowerCase().includes(searchTerm) || 
          e.username?.toLowerCase().includes(searchTerm)
        );
      }
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔐</div>
            <h2>No passwords yet</h2>
            <p>Click "New Password" to add your first entry</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = '<div class="entries-grid">' + filtered.map(entry => `
        <div class="entry-card">
          <div class="entry-header">
            <div class="entry-title">${escapeHtml(entry.title)}</div>
            <div class="entry-actions">
              <button class="icon-btn" onclick="checkEntryBreach('${entry.id}')" title="Check breach">🔍</button>
              <button class="icon-btn" onclick="editEntry('${entry.id}')" title="Edit">✏️</button>
              <button class="icon-btn" onclick="deleteEntry('${entry.id}')" title="Delete">🗑️</button>
            </div>
          </div>
          ${entry.username ? `
            <div class="entry-field">
              <label>Username</label>
              <div>${escapeHtml(entry.username)} <button class="icon-btn" onclick="copyText('${escapeHtml(entry.username)}')">📋</button></div>
            </div>
          ` : ''}
          <div class="entry-field">
            <label>Password</label>
            <div class="password-field">
              <span class="password-value password-hidden" id="pwd-${entry.id}">••••••••••••</span>
              <button class="icon-btn" onclick="togglePassword('${entry.id}', '${btoa(entry.password)}')">👁️</button>
              <button class="icon-btn" onclick="copyText('${btoa(entry.password)}', true)">📋</button>
            </div>
          </div>
          ${entry.url ? `
            <div class="entry-field">
              <label>Website</label>
              <a href="${escapeHtml(entry.url)}" target="_blank" style="color: var(--accent-green);">🔗 ${escapeHtml(entry.url)}</a>
            </div>
          ` : ''}
        </div>
      `).join('') + '</div>';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    window.togglePassword = function(id, encoded) {
      const el = document.getElementById(`pwd-${id}`);
      if (el.classList.contains('password-hidden')) {
        el.textContent = atob(encoded);
        el.classList.remove('password-hidden');
      } else {
        el.textContent = '••••••••••••';
        el.classList.add('password-hidden');
      }
    };
    
    window.copyText = function(text, isBase64 = false) {
      const decoded = isBase64 ? atob(text) : text;
      navigator.clipboard.writeText(decoded);
      showNotification('Copied to clipboard!', 'success');
    };
    
    window.openAddModal = function() {
      editingEntryId = null;
      document.getElementById('modalTitle').textContent = 'Add Password';
      document.getElementById('entryForm').reset();
      document.getElementById('entryModal').classList.add('active');
    };
    
    window.editEntry = function(id) {
      const entry = allEntries.find(e => e.id === id);
      if (!entry) return;
      
      editingEntryId = id;
      document.getElementById('modalTitle').textContent = 'Edit Password';
      document.getElementById('entryTitle').value = entry.title || '';
      document.getElementById('entryUsername').value = entry.username || '';
      document.getElementById('entryPassword').value = entry.password || '';
      document.getElementById('entryUrl').value = entry.url || '';
      document.getElementById('entryCategory').value = entry.category || 'other';
      document.getElementById('entryNotes').value = entry.notes || '';
      document.getElementById('entryModal').classList.add('active');
    };
    
    window.closeModal = function() {
      document.getElementById('entryModal').classList.remove('active');
    };
    
    window.saveEntry = async function(e) {
      e.preventDefault();
      
      const data = {
        title: document.getElementById('entryTitle').value,
        username: document.getElementById('entryUsername').value,
        password: document.getElementById('entryPassword').value,
        url: document.getElementById('entryUrl').value,
        notes: document.getElementById('entryNotes').value
      };
      
      const category = document.getElementById('entryCategory').value;
      const {encrypted, iv} = await encryptData(data, encryptionKey);
      
      if (editingEntryId) {
        const {error} = await supabase.from('vault_entries').update({
          encrypted_data: encrypted,
          iv: iv,
          category: category
        }).eq('id', editingEntryId);
        
        if (error) {
          showNotification('Error updating entry', 'error');
          return;
        }
        showNotification('Entry updated!', 'success');
      } else {
        const {error} = await supabase.from('vault_entries').insert({
          user_id: currentUser.id,
          encrypted_data: encrypted,
          iv: iv,
          auth_tag: '',
          category: category
        });
        
        if (error) {
          showNotification('Error adding entry', 'error');
          return;
        }
        showNotification('Entry added!', 'success');
      }
      
      closeModal();
      await loadEntries();
    };
    
    window.deleteEntry = async function(id) {
      if (!confirm('Delete this password?')) return;
      
      const {error} = await supabase.from('vault_entries').delete().eq('id', id);
      if (error) {
        showNotification('Error deleting entry', 'error');
        return;
      }
      
      showNotification('Entry deleted', 'success');
      await loadEntries();
    };
    
    window.lockVault = function() {
      sessionStorage.removeItem('master_password');
      window.location.href = '/login.html';
    };
    
    window.logout = async function() {
      await supabase.auth.signOut();
      sessionStorage.clear();
      window.location.href = '/';
    };
    
    window.exportVault = async function() {
      if (!confirm('Export your vault? This will create an encrypted backup file.')) return;
      
      try {
        const vaultData = {
          version: '1.0',
          exported: new Date().toISOString(),
          entries: allEntries.map(entry => ({
            id: entry.id,
            title: entry.title,
            username: entry.username,
            password: entry.password,
            url: entry.url,
            notes: entry.notes,
            category: entry.category,
            created_at: entry.created_at
          }))
        };
        
        const dataStr = JSON.stringify(vaultData, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `fard-vault-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showNotification('Vault exported successfully!', 'success');
      } catch (error) {
        console.error('Export error:', error);
        showNotification('Failed to export vault', 'error');
      }
    };
    
    window.importVault = function() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          
          if (!data.entries || !Array.isArray(data.entries)) {
            throw new Error('Invalid backup file format');
          }
          
          if (!confirm(`Import ${data.entries.length} entries? This will add them to your vault.`)) {
            return;
          }
          
          for (const entry of data.entries) {
            const {encrypted, iv} = await encryptData({
              title: entry.title,
              username: entry.username,
              password: entry.password,
              url: entry.url,
              notes: entry.notes
            }, encryptionKey);
            
            await supabase.from('vault_entries').insert({
              user_id: currentUser.id,
              encrypted_data: encrypted,
              iv: iv,
              auth_tag: '',
              category: entry.category || 'other'
            });
          }
          
          showNotification(`Successfully imported ${data.entries.length} entries!`, 'success');
          await loadEntries();
        } catch (error) {
          console.error('Import error:', error);
          showNotification('Failed to import vault: ' + error.message, 'error');
        }
      };
      input.click();
    };
    
    window.toggleTheme = function() {
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      if (html.getAttribute('data-theme') === 'light') {
        html.removeAttribute('data-theme');
        icon.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      } else {
        html.setAttribute('data-theme', 'light');
        icon.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      }
    };
    
    function showNotification(message, type = 'success') {
      document.querySelectorAll('.notification').forEach(n => n.remove());
      
      const notif = document.createElement('div');
      notif.className = `notification ${type}`;
      notif.textContent = message;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }
    
    // Password Breach Check
    async function checkPasswordBreach(password) {
      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-1', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        
        const prefix = hashHex.slice(0, 5);
        const suffix = hashHex.slice(5);
        
        const response = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
        const text = await response.text();
        
        if (text.includes(suffix)) {
          const count = text.split('\n').find(line => line.startsWith(suffix))?.split(':')[1] || '0';
          return { 
            compromised: true, 
            count: parseInt(count),
            message: `Found in ${parseInt(count).toLocaleString()} breaches!` 
          };
        }
        return { compromised: false, message: 'Not found in breaches' };
      } catch (error) {
        return { compromised: false, message: 'Could not check' };
      }
    }
    
    window.checkEntryBreach = async function(entryId) {
      const entry = allEntries.find(e => e.id === entryId);
      if (!entry) return;
      
      showNotification('Checking for breaches...', 'info');
      const result = await checkPasswordBreach(entry.password);
      
      if (result.compromised) {
        showNotification(`⚠️ ${entry.title}: ${result.message}`, 'error');
      } else {
        showNotification(`✅ ${entry.title}: ${result.message}`, 'success');
      }
    };
    
    // Vault Health Analysis
    function analyzeVaultHealth() {
      const passwords = {};
      let weak = 0, reused = 0, old = 0, strong = 0;
      
      allEntries.forEach(entry => {
        const pwd = entry.password;
        if (pwd.length < 12) weak++;
        else if (pwd.length >= 16 && /[A-Z]/.test(pwd) && /[a-z]/.test(pwd) && /[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) strong++;
        
        if (passwords[pwd]) reused++;
        passwords[pwd] = true;
        
        const created = new Date(entry.created_at);
        const sixMonthsAgo = new Date();
        sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
        if (created < sixMonthsAgo) old++;
      });
      
      const total = allEntries.length;
      return { 
        total, weak, reused, old, strong,
        weakPercent: Math.round((weak / total) * 100) || 0,
        reusedPercent: Math.round((reused / total) * 100) || 0,
        oldPercent: Math.round((old / total) * 100) || 0,
        strongPercent: Math.round((strong / total) * 100) || 0
      };
    }
    
    window.showHealthDashboard = function() {
      const health = analyzeVaultHealth();
      const dashboardHTML = `
        <div class="modal active" onclick="if(event.target === this) closeHealthDashboard()">
          <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
              <h2 class="modal-title">🏥 Vault Health Dashboard</h2>
              <button class="close-btn" onclick="closeHealthDashboard()">&times;</button>
            </div>
            <div style="padding: 20px 0;">
              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;">
                <div style="background: var(--card-bg); padding: 20px; border-radius: 10px; text-align: center;">
                  <div style="font-size: 2.5em; font-weight: bold; color: var(--accent-green);">${health.total}</div>
                  <div style="color: var(--text-secondary); font-size: 0.9em;">Total Passwords</div>
                </div>
                <div style="background: var(--card-bg); padding: 20px; border-radius: 10px; text-align: center;">
                  <div style="font-size: 2.5em; font-weight: bold; color: #28a745;">${health.strong}</div>
                  <div style="color: var(--text-secondary); font-size: 0.9em;">Strong (${health.strongPercent}%)</div>
                </div>
                <div style="background: var(--card-bg); padding: 20px; border-radius: 10px; text-align: center;">
                  <div style="font-size: 2.5em; font-weight: bold; color: #ff4444;">${health.weak}</div>
                  <div style="color: var(--text-secondary); font-size: 0.9em;">Weak (${health.weakPercent}%)</div>
                </div>
                <div style="background: var(--card-bg); padding: 20px; border-radius: 10px; text-align: center;">
                  <div style="font-size: 2.5em; font-weight: bold; color: #ffc107;">${health.reused}</div>
                  <div style="color: var(--text-secondary); font-size: 0.9em;">Reused (${health.reusedPercent}%)</div>
                </div>
              </div>
              <div style="background: var(--card-bg); padding: 15px; border-radius: 10px;">
                <h3 style="margin-bottom: 10px;">📊 Recommendations</h3>
                ${health.weak > 0 ? `<p style="color: #ff4444; margin: 5px 0;">🔴 Update ${health.weak} weak passwords</p>` : ''}
                ${health.reused > 0 ? `<p style="color: #ffc107; margin: 5px 0;">🟡 ${health.reused} passwords are reused</p>` : ''}
                ${health.old > 0 ? `<p style="color: #17a2b8; margin: 5px 0;">🔵 ${health.old} passwords are 6+ months old</p>` : ''}
                ${health.weak === 0 && health.reused === 0 && health.old === 0 ? `<p style="color: #28a745;">✅ Excellent vault health!</p>` : ''}
              </div>
            </div>
            <button class="btn" onclick="closeHealthDashboard()" style="width: 100%;">Close</button>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', dashboardHTML);
    };
    
    window.closeHealthDashboard = function() {
      const modal = document.querySelector('.modal');
      if (modal && modal.querySelector('.modal-title')?.textContent.includes('Health')) {
        modal.remove();
      }
    };
    
    // Event listeners
    document.getElementById('searchBox').addEventListener('input', renderEntries);
    
    document.querySelectorAll('.category-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.category;
        renderEntries();
      });
    });
    
    // Initialize
    const theme = localStorage.getItem('theme');
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.getElementById('themeIcon').textContent = '☀️';
    }
    
    // Set year
    document.getElementById('vaultYear').textContent = new Date().getFullYear();
    
    initVault();
  </script>
</body>
</html>

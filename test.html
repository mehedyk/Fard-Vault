<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- SECURITY FIX: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://api.pwnedpasswords.com; img-src 'self' data:;">
  <title>Supabase Connection Test</title>
  <style>
    body {
      font-family: monospace;
      padding: 40px;
      background: #0b0b0b;
      color: #39ff14;
    }
    .result {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      border: 2px solid #39ff14;
    }
    .error { border-color: #ff4444; color: #ff4444; }
    .success { border-color: #39ff14; color: #39ff14; }
    button {
      background: #39ff14;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
    }
    pre { 
      background: #000; 
      padding: 15px; 
      overflow-x: auto;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>🔍 Supabase Connection Test</h1>
  
  <div>
    <button onclick="testConnection()">1. Test Connection</button>
    <button onclick="testAuth()">2. Test Auth</button>
    <button onclick="testTables()">3. Test Tables</button>
    <button onclick="testRegistration()">4. Test Registration</button>
  </div>
  
  <div id="results"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL || 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY || 'YOUR_SUPABASE_ANON_KEY';
    
    let supabase;
    
    function log(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
      document.getElementById('results').appendChild(div);
    }
    
    async function testConnection() {
      log('Testing Supabase connection...', 'info');
      
      try {
        if (!SUPABASE_URL || !SUPABASE_KEY) {
          log('❌ ERROR: Environment variables not set!<br>VITE_SUPABASE_URL: ' + (SUPABASE_URL || 'MISSING') + '<br>VITE_SUPABASE_ANON_KEY: ' + (SUPABASE_KEY ? 'Set ✅' : 'MISSING'), 'error');
          return;
        }
        
        log('✅ Environment variables found', 'success');
        log('URL: ' + SUPABASE_URL, 'info');
        log('Key: ' + SUPABASE_KEY.substring(0, 20) + '...', 'info');
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const { data, error } = await supabase.from('user_keys').select('count');
        
        if (error) {
          log('❌ Connection ERROR: ' + error.message, 'error');
          log('<pre>' + JSON.stringify(error, null, 2) + '</pre>', 'error');
        } else {
          log('✅ Connection SUCCESS! Supabase is reachable.', 'success');
        }
        
      } catch (err) {
        log('❌ EXCEPTION: ' + err.message, 'error');
        console.error(err);
      }
    }
    
    async function testAuth() {
      log('Testing Supabase Auth...', 'info');
      
      if (!supabase) {
        log('⚠️ Run "Test Connection" first!', 'error');
        return;
      }
      
      try {
        const { data, error } = await supabase.auth.getSession();
        
        if (error) {
          log('❌ Auth ERROR: ' + error.message, 'error');
        } else {
          log('✅ Auth is configured correctly!', 'success');
          log('Current session: ' + (data.session ? 'Logged in' : 'Not logged in'), 'info');
        }
      } catch (err) {
        log('❌ EXCEPTION: ' + err.message, 'error');
      }
    }
    
    async function testTables() {
      log('Testing database tables...', 'info');
      
      if (!supabase) {
        log('⚠️ Run "Test Connection" first!', 'error');
        return;
      }
      
      // UPDATED: includes rate_limiting functions table check
      const tables = ['user_keys', 'vault_entries', 'categories', 'rate_limits', 'audit_log'];
      
      for (const table of tables) {
        try {
          const { data, error } = await supabase.from(table).select('count', { count: 'exact', head: true });
          
          if (error) {
            log(`❌ Table "${table}" ERROR: ${error.message}`, 'error');
            if (error.message.includes('does not exist')) {
              log('⚠️ SOLUTION: Run migration 001_initial_schema.sql in Supabase SQL Editor', 'error');
            }
          } else {
            log(`✅ Table "${table}" exists and is accessible`, 'success');
          }
        } catch (err) {
          log(`❌ Table "${table}" EXCEPTION: ${err.message}`, 'error');
        }
      }

      // Test server-side rate limiting RPC functions exist
      log('Testing server-side rate limiting RPC functions...', 'info');
      try {
        const { error } = await supabase.rpc('record_failed_login', { p_identifier: 'test@test.com' });
        if (error && error.message.includes('does not exist')) {
          log('❌ RPC "record_failed_login" not found — run migration 003_server_rate_limiting.sql', 'error');
        } else {
          log('✅ RPC "record_failed_login" exists', 'success');
          // Clean up test call
          await supabase.rpc('reset_failed_logins', { p_identifier: 'test@test.com' });
        }
      } catch (err) {
        log('⚠️ Could not verify RPC functions: ' + err.message, 'error');
      }
    }
    
    async function testRegistration() {
      log('Testing user registration flow...', 'info');
      
      if (!supabase) {
        log('⚠️ Run "Test Connection" first!', 'error');
        return;
      }
      
      const testEmail = 'test_' + Date.now() + '@example.com';
      const testPassword = 'TestPassword123!@#';
      
      log('Creating test account: ' + testEmail, 'info');
      
      try {
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email: testEmail,
          password: testPassword
        });
        
        if (authError) {
          log('❌ Registration ERROR: ' + authError.message, 'error');
          log('<pre>' + JSON.stringify(authError, null, 2) + '</pre>', 'error');
          if (authError.message.includes('User already registered')) {
            log('ℹ️ This is OK - it means auth is working!', 'info');
          }
          return;
        }
        
        log('✅ User created in auth.users!', 'success');
        log('User ID: ' + authData.user.id, 'info');
        
        const salt = 'test_salt_base64_encoded_string';
        
        const { data: keyData, error: keyError } = await supabase
          .from('user_keys')
          .insert({ user_id: authData.user.id, salt: salt });
        
        if (keyError) {
          log('❌ user_keys INSERT ERROR: ' + keyError.message, 'error');
          log('<pre>' + JSON.stringify(keyError, null, 2) + '</pre>', 'error');
          if (keyError.message.includes('violates row-level security')) {
            log('⚠️ SOLUTION: RLS policy issue. Run migration 002_rls_policies.sql', 'error');
          }
        } else {
          log('✅ Successfully inserted into user_keys!', 'success');
          log('✅ REGISTRATION WORKS! Your setup is correct.', 'success');
        }
        
        await supabase.auth.signOut();
        
      } catch (err) {
        log('❌ EXCEPTION during registration: ' + err.message, 'error');
        console.error(err);
      }
    }

    window.testConnection = testConnection;
    window.testAuth = testAuth;
    window.testTables = testTables;
    window.testRegistration = testRegistration;
  </script>
</body>
</html>
